_target_: diffcsp.pl_modules.energy_matching_model.CSPEnergyMatching
time_dim: 256
latent_dim: 0
cost_coord: 1.
cost_lattice: 1.
max_neighbors: 20  # maximum number of neighbors for OTF graph bulding in decoder
radius: 7.  # maximum search radius for OTF graph building in decoder
timesteps: 1000
flow_timesteps: 1000
learning_stage: flow
dt: 0.01
langevin_steps: 200
langevin_coord_noise: 0.01
langevin_lattice_noise: 0.01
lambda_cd: 0.01
flow_warm_epochs: 2800
lattice_noise_mode: 3
tau: 0.99999999
flow_coord_huber_beta: 0.4


defaults:
  - decoder: scalar_softnotimecspnet
  - beta_scheduler: cosine
  - flow_beta_scheduler: cosine_flow
  - sigma_scheduler: wrapped
